<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Jamar Martin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1c;
    --ink: #e8e6e2;
    --muted: #666462;
    --accent: #c8a96e;
    --line: #2a2a2d;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
    border-bottom: 1px solid var(--line);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-decoration: none;
    color: var(--ink);
  }

  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    text-decoration: none;
    color: var(--muted);
    font-size: 17px;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-transform: none;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .contact-info {
    padding: 72px 48px;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 48px;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 5vw, 60px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .info-block { display: flex; flex-direction: column; gap: 8px; }

  .info-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .info-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.6;
  }

  .info-value a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .info-value a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .disclosure {
    margin-top: auto;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.7;
  }

  .contact-form {
    padding: 72px 48px;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, textarea {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 10px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    resize: none;
  }

  input::placeholder, textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  input:focus, textarea:focus {
    border-bottom-color: var(--muted);
  }

  textarea { height: 110px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 13px 28px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: background 0.2s, gap 0.2s;
    align-self: flex-start;
    margin-top: 4px;
  }
  .btn:hover { background: var(--accent); gap: 20px; }

  footer {
    border-top: 1px solid var(--line);
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.07em;
  }

  footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  footer a:hover { color: var(--ink); }
  .footer-links { display: flex; gap: 28px; }

  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    main { grid-template-columns: 1fr; }
    .contact-info { padding: 48px 24px; border-right: none; border-bottom: 1px solid var(--line); }
    .contact-form { padding: 48px 24px; }
    footer { padding: 20px 24px; flex-direction: column; gap: 14px; text-align: center; }
    .footer-links { flex-wrap: wrap; justify-content: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Jamar Martin</a>
  <ul class="nav-links">
    <li><a href="/contact" class="active">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="contact-info">
    <h1 class="page-title">Contact</h1>

    <div class="info-block">
      <div class="info-label">Email</div>
      <div class="info-value"><a href="mailto:contact@jamarmartin.com">contact@jamarmartin.com</a></div>
    </div>

    <div class="info-block">
      <div class="info-label">Phone</div>
      <div class="info-value"><a href="tel:+17863218696">(786) 321-8696</a></div>
    </div>

    <div class="info-block">
      <div class="info-label">Address</div>
      <div class="info-value">
        7901 4th St N, Ste 300<br>
        St. Petersburg, FL 33702<br>
        United States
      </div>
    </div>

    <p class="disclosure">All ventures are operated under Jamar Martin LLC.</p>
  </div>

  <div class="contact-form">
    <form action="https://formspree.io/f/xnjbevbp" method="POST">
      <div style="display:flex;flex-direction:column;gap:36px;">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
        </div>
        <div>
          <button type="submit" class="btn">Send Message &#x2192;</button>
        </div>
      </div>
    </form>
  </div>
</main>

<footer>
  <span>&copy; 2026 Jamar Martin LLC. All rights reserved.</span>
  <div class="footer-links">
    <a href="/privacy-policy">Privacy Policy</a>
    <a href="/terms-of-service">Terms of Service</a>
  </div>
</footer>

</body>
</html>
